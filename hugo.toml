baseURL = 'https://vataseradu.github.io/'
languageCode = 'en'
title = 'Vatase Radu - Cybersecurity Research'
theme = 'PaperMod'

# SEO & Performance
enableRobotsTXT = true
enableSitemap = true
outputFormats = { SearchIndex = { baseName = "searchindex", mediaType = "application/json", isPlainText = true, notAlternative = true } }

[pagination]
  pagerSize = 10

[params]
  author = 'Vatase Radu'
  description = 'Cybersecurity research and academic notes by Vatase Radu'
  keywords = 'Vatase Radu, cybersecurity, penetration testing, vulnerability research, CTF writeups, infosec'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = 'light'
  disableThemeToggle = false
  profileMode = false
  
  # Open Graph & Social
  images = ["https://vataseradu.github.io/og-image.png"]
  
  [params.homeInfoParams]
    Title = 'Vatase Radu'
    Content = """Vulnerability Manager & Penetration Tester @ [Safetech Innovations](https://safetech.ro/)<br>
Master's in Cybersecurity — [Theory of Coding and Storage of Information](https://tcsi.ro/), UPB<br>
Bachelor's in Electrical Engineering in Applied Informatics — [electro.upb.ro](https://electro.upb.ro/)

Cybersecurity research and academic notes.

*Vatase Radu*"""

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/vataseradu'
  
  [[params.socialIcons]]
    name = 'email'
    url = 'mailto:contact@vataseradu.github.io'

[params.assets]
  disableHLJS = false

[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = false
    noClasses = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]

[[menu.main]]
  name = 'About'
  url = '/about/'
  weight = 1

[[menu.main]]
  name = 'Archive'
  url = '/archive/'
  weight = 2

[[menu.main]]
  name = 'Categories'
  url = '/categories/'
  weight = 3

[[menu.main]]
  name = 'Tags'
  url = '/tags/'
  weight = 4

[[menu.main]]
  name = 'Projects'
  url = '/projects/'
  weight = 5

[[menu.main]]
  name = 'Tools'
  url = '/tools/'
  weight = 6

[[menu.main]]
  name = 'Search'
  url = '/search/'
  weight = 7

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  page = ['HTML']
